<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>联系我们</title>
    <link rel="stylesheet" href="css/index.css">
    <style>
    .box {
        padding-bottom: 50px;
    }

    p {
        text-align: center;
        font-weight: 300;
        line-height: 2;
    }
    </style>
</head>

<body>
    <div class="top">
        <div class="main">
            <img src="images/logo.webp" alt="">
            <h1>我眼中的青岛</h1>
            <div class="time">
                <script type="text/javascript">
                var date = new Date();
                document.write("今天是：" + date.getFullYear() + "年" + (date.getMonth() + 1) + "月" + date.getDate() + "日");
                </script>
            </div>
        </div>
    </div>
    <div class="head">
        <div class="main">
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a class="select" href="about.html">联系我们</a></li>
                <li><a href="introduce.html">简介</a></li>
                <li><a href="route.html">路线经典</a></li>
                <li><a href="food.html">特色小吃</a></li>
                <li><a href="article.html">满满的回忆</a></li>
                <div class="clear"></div>
            </ul>
        </div>
    </div>
    <div class="box">
        <div class="content">
            <div class="main">
                <div class="row row_left">
                    <div class="content_title">
                        <h2>关于我们</h2>
                    </div>
                    <p>
                        中国年轻一代用得更多的旅游网站
                        <br> 上亿旅行者共同打造的"旅行神器"
                        <br> 60,000多个全球旅游目的地
                        <br> 600,000个细分目的地新玩法
                        <br> 760,000,000次攻略下载
                        <br> 38,000家旅游产品供应商
                    </p>
                    <div class="map">
                        <img src="images/map.jpg" alt="">
                    </div>
                </div>
                <div class="row row_right">
                    <div class="content_title">
                        <h2>联系我们</h2>
                    </div>
                    <form action="#">
                        <div class="input_info">
                            <span class="label">用户名</span>
                            <input type="text" id="user" placeholder="请输入用户名（2-4位中文）">
                        </div>
                        <div class="input_info">
                            <span class="label">邮箱</span>
                            <input type="email" id="email" placeholder="请输入邮箱">
                        </div>
                        <div class="input_info">
                            <span class="label">电话</span>
                            <input type="tel" id="phone" placeholder="请输入电话">
                        </div>
                        <div class="input_info">
                            <span class="label">留言</span>
                            <textarea name="" id="liuyan" cols="30" rows="10"></textarea>
                        </div>
                        <input type="submit" value="提交" id="btn">
                    </form>
                </div>
                <div class="clear"></div>
            </div>
        </div>
    </div>
    <div class="footer">
        <p>版权属于|我眼中的青岛 | 2024</p>
    </div>
</body>
<script>
var btn = document.querySelector('#btn')
btn.addEventListener('click', function() {
    var user = document.querySelector('#user').value
    var email = document.querySelector('#email').value
    var phone = document.querySelector('#phone').value
    var liuyan = document.querySelector('#liuyan').value

    var pattern = /[\u4e00-\u9fa5]{2,4}$/;
    if (pattern.test(user) === true) {

        var reg2 = /^([a-zA-Z]|[0-9])(\w|\-)+@[a-zA-Z0-9]+\.([a-zA-Z]{2,4})$/;
        if (!reg2.test(email)) {
            alert("请输入正确邮箱格式");
            document.querySelector('#email').focus();
            return false;
        } else {
            var reg3 = /^(((13[0-9]{1})|(15[0-9]{1})|(18[0-9]{1}))+\d{8})$/;
            if (!reg3.test(phone)) {
                alert("请输入正确手机号");
                document.querySelector('#phone').focus();
                return false;
            } else {
                if (liuyan.length === 0) {
                    alert("请输入留言内容");
                    document.querySelector('#liuyan').focus();
                    return false;
                } else {
                    alert('提交成功')
                }
            }
        }

    } else {
        alert("请输入2-4位中文");
        document.querySelector('#user').focus();
    }
})
</script>

</html>
